kcp_version: "0.14"
project: "rotation_gap_is_flat"
description: >
  Paper 3 of the Merkabit series: The Rotation Gap Is Not An Error. Every qubit is a
  merkabit restricted to the B31 binary sector of PSL(2,7). This paper measures the
  rotation gap (12.6 pp) between B31 (86.1%) and T75 (98.7%) detection rates, shows it
  is flat across four orders of magnitude of error rate (CV < 3%), demonstrates two-scale
  error suppression (931–1862×), and provides a zero-overhead migration path from qubit to
  ternary computation. The published PDF (Paper_3_The_Rotation_Gap_Is_Not_An_Error_v1.pdf)
  landed 2026-04-06; the DOCX (Paper_15_Binary_Ternary_Hybrid_Architecture_v4.docx)
  is a prior working title for the same content.
version: "1.0"
created: "2026-04-06"
maintainer: "Selina Stenberg"

# ─── UNITS ────────────────────────────────────────────────────────────────────
units:

  # ORIENTATION
  - id: readme
    path: README.md
    intent: >
      Entry point for Paper 15: defines the rotation gap (12.6 pp), two-scale
      error correction (35× torus, 26.6× torsion = 931–1862× combined),
      optimal coupling κ*_intra=0 / κ*_inter=1.0, and migration path.
    scope: global
    audience: ["human", "developer"]
    validated: "2026-04-06"
    hints:
      load_strategy: eager
      token_estimate: 400
      priority: critical

  # MANUSCRIPT — PUBLISHED PDF (primary)
  - id: paper-pdf
    path: paper/Paper_3_The_Rotation_Gap_Is_Not_An_Error_v1.pdf
    intent: >
      Published PDF of Paper 3: The Rotation Gap Is Not An Error. Primary orientation
      unit. Establishes that the 12.6 pp gap between B31 (86.1%) and T75 (98.7%)
      detection rates is an architectural property of PSL(2,7), not a simulation
      artefact, and demonstrates zero-overhead qubit→merkabit migration.
    scope: project
    audience: ["human"]
    validated: "2026-04-06"
    hints:
      load_strategy: eager
      token_estimate: 1500
      priority: critical
    triggers:
      - "Paper 3"
      - "rotation gap"
      - "full paper"
      - "manuscript"
      - "read the paper"
      - "not an error"

  # MANUSCRIPT — PRIOR WORKING DRAFT (DOCX)
  - id: paper-manuscript-docx
    path: paper/Paper_15_Binary_Ternary_Hybrid_Architecture_v4.docx
    intent: "Prior working-title DOCX draft (Binary-Ternary Hybrid Architecture v4) — superseded by the published PDF"
    scope: project
    audience: ["human"]
    validated: "2026-04-06"
    hints:
      load_strategy: lazy
      token_estimate: 1500
      priority: reference
    triggers:
      - "docx"
      - "working draft"
      - "binary ternary hybrid architecture"

  # CORE SIMULATIONS
  - id: hybrid-simulation
    path: simulations/binary_ternary_hybrid_simulation.py
    intent: >
      Main hybrid architecture simulation. Measures B31 vs T75 detection rates,
      optimal hybrid coupling κ*, two-scale suppression S_torus × S_L2,
      and π-lock contribution. Seed=42, deterministic.
    scope: module
    audience: ["developer", "human"]
    validated: "2026-04-06"
    depends_on: [readme]
    hints:
      load_strategy: lazy
      token_estimate: 250
      priority: critical
    triggers:
      - "binary ternary hybrid"
      - "rotation gap"
      - "12.6 pp"
      - "B31 T75"
      - "detection rate"
      - "migration"
      - "qubit to ternary"

  - id: scale-separation-sweep
    path: simulations/scale_separation_sweep.py
    intent: >
      Sweeps B31 vs T75 detection rate across 14 error rates spanning four orders
      of magnitude. Confirms rotation gap is flat (CV < 3%) — architectural,
      not noise-dependent. Runtime ~160s.
    scope: module
    audience: ["human", "developer"]
    validated: "2026-04-06"
    depends_on: [hybrid-simulation]
    hints:
      load_strategy: lazy
      token_estimate: 200
      priority: critical
    triggers:
      - "flat"
      - "CV < 3%"
      - "orders of magnitude"
      - "architectural property"
      - "noise independent"

  - id: asymptote-mapping
    path: simulations/asymptote_mapping.py
    intent: "Extends to 61/91 node systems — maps saturation behaviour and asymptote of suppression"
    scope: module
    audience: ["human"]
    validated: "2026-04-06"
    depends_on: [scale-separation-sweep]
    hints:
      load_strategy: lazy
      token_estimate: 200
      priority: supplementary
    triggers:
      - "asymptote"
      - "saturation"
      - "61 nodes"
      - "91 nodes"
      - "large system"

  - id: eisenstein-torus-sim
    path: simulations/eisenstein_torus_simulation.py
    intent: >
      Direct measurement of S_torus = 35× intra-unit toroidal correction factor
      on the Eisenstein torus. Provides Scale 1 of the two-scale correction.
    scope: module
    audience: ["human", "developer"]
    validated: "2026-04-06"
    hints:
      load_strategy: lazy
      token_estimate: 200
      priority: critical
    triggers:
      - "S_torus"
      - "35x"
      - "intra-unit"
      - "toroidal correction"
      - "Scale 1"
      - "Eisenstein torus"

  - id: temporal-spatial-bridge
    path: simulations/temporal_spatial_bridge.py
    intent: >
      Ouroboros cycle temporal-spatial equivalence — proves the time dimension
      of the closed cycle is equivalent to the spatial Z62 coupling channel.
      Establishes that temporal correction is the same as spatial torsion correction.
    scope: module
    audience: ["human"]
    validated: "2026-04-06"
    hints:
      load_strategy: lazy
      token_estimate: 200
      priority: supplementary
    triggers:
      - "Ouroboros"
      - "temporal spatial"
      - "time dimension"
      - "Z62 coupling"

  # OUTPUTS (DETERMINISTIC REFERENCE VALUES)
  - id: output-hybrid
    path: outputs/binary_ternary_hybrid_output.txt
    intent: "Reference output: B31=86.1%, T75=98.7%, rotation gap=12.6 pp, optimal κ*"
    scope: module
    audience: ["developer"]
    validated: "2026-04-06"
    depends_on: [hybrid-simulation]
    hints:
      load_strategy: lazy
      token_estimate: 150
      priority: supplementary
    triggers:
      - "86.1"
      - "98.7"
      - "12.6"
      - "reference values"

  - id: output-scale-separation
    path: outputs/scale_separation_sweep_output.txt
    intent: "Reference output from 14-point scale separation sweep (CV < 3% flatness)"
    scope: module
    audience: ["developer"]
    validated: "2026-04-06"
    hints:
      load_strategy: lazy
      token_estimate: 150
      priority: reference

  - id: output-asymptote
    path: outputs/asymptote_mapping_output.txt
    intent: "Reference output from asymptote mapping (61/91 node saturation)"
    scope: module
    audience: ["developer"]
    validated: "2026-04-06"
    hints:
      load_strategy: lazy
      token_estimate: 150
      priority: reference

  - id: output-eisenstein
    path: outputs/eisenstein_torus_output.txt
    intent: "Reference output from Eisenstein torus simulation (S_torus = 35×)"
    scope: module
    audience: ["developer"]
    validated: "2026-04-06"
    hints:
      load_strategy: lazy
      token_estimate: 150
      priority: reference

  - id: output-temporal-spatial
    path: outputs/temporal_spatial_bridge_output.txt
    intent: "Reference output from temporal-spatial bridge simulation"
    scope: module
    audience: ["developer"]
    validated: "2026-04-06"
    hints:
      load_strategy: lazy
      token_estimate: 150
      priority: reference

# ─── RELATIONSHIPS ────────────────────────────────────────────────────────────
relationships:
  - from: hybrid-simulation
    to: scale-separation-sweep
    type: precedes
    note: "Run hybrid-simulation first to establish baseline, then sweep confirms flatness"

  - from: hybrid-simulation
    to: eisenstein-torus-sim
    type: related
    note: "S_torus from eisenstein_torus feeds into two-scale product"

  - from: scale-separation-sweep
    to: asymptote-mapping
    type: precedes

  - from: temporal-spatial-bridge
    to: hybrid-simulation
    type: supports
    note: "Establishes theoretical basis for Z62 coupling channel used in hybrid simulation"

  - from: paper-manuscript
    to: hybrid-simulation
    type: describes
